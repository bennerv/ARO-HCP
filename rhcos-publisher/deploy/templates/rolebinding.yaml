{{- if .Values.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhcos-publisher-controller
  namespace: '{{ .Release.Namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhcos-publisher-controller
subjects:
- kind: ServiceAccount
  name: '{{ .Values.serviceAccount.name }}'
  namespace: '{{ .Release.Namespace }}'
{{- end }}
